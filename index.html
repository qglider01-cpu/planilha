<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar PRO - Gabriel Rodrigues</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --lunar-blue: #1e293b;
            --lunar-glow: #38bdf8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: white; 
            overflow-x: hidden;
            margin: 0;
        }

        /* Fundo Lunar Animado */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Bordas Animadas */
        .animated-border {
            position: relative;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 1rem;
            z-index: 1;
        }

        .animated-border::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, var(--lunar-glow), transparent, #818cf8, transparent);
            background-size: 400%;
            z-index: -1;
            border-radius: 1.1rem;
            animation: borderRotate 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes borderRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Gerador de Estrelas
        const Stars = () => {
            useEffect(() => {
                const container = document.getElementById('stars');
                for (let i = 0; i < 100; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 2 + 1 + 'px';
                    star.style.width = size;
                    star.style.height = size;
                    star.style.top = Math.random() * 100 + '%';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                    container.appendChild(star);
                }
            }, []);
            return null;
        };

        const StatCard = ({ label, val, color, icon: Icon }) => (
            <div className={`animated-border p-4 flex flex-col gap-1`}>
                <div className="flex justify-between items-center text-slate-400 text-xs font-bold uppercase tracking-widest">
                    {label}
                    <i data-lucide={Icon} className="w-4 h-4 text-sky-400"></i>
                </div>
                <div className="text-xl font-bold tracking-tight">
                    R$ {val.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                </div>
            </div>
        );

        function App() {
            const [transactions, setTransactions] = useState([]);
            const [form, setForm] = useState({ name: '', amount: '', type: 'saida' });

            useEffect(() => {
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }, [transactions]);

            const addEntry = (e) => {
                e.preventDefault();
                if(!form.name || !form.amount) return;
                
                const novo = {
                    id: Date.now(),
                    name: form.name,
                    val: parseFloat(form.amount),
                    type: form.type,
                    time: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
                };
                setTransactions([novo, ...transactions]);
                setForm({ ...form, name: '', amount: '' });
            };

            const saldo = useMemo(() => {
                return transactions.reduce((acc, t) => t.type === 'entrada' ? acc + t.val : acc - t.val, 0);
            }, [transactions]);

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto px-4 py-6">
                    <Stars />
                    
                    {/* Header Minimalista */}
                    <header className="mb-8 text-center">
                        <h1 className="text-2xl font-extrabold tracking-tighter bg-gradient-to-b from-white to-slate-500 bg-clip-text text-transparent">
                            LUNAR PLANILHA
                        </h1>
                        <div className="text-[10px] text-sky-400 font-bold tracking-[0.2em] uppercase">Sistema Automático</div>
                    </header>

                    {/* Cards de Status */}
                    <div className="grid grid-cols-2 gap-3 mb-6">
                        <div className="col-span-2">
                             <StatCard label="Saldo Disponível" val={saldo} icon="wallet" />
                        </div>
                    </div>

                    {/* Input Rápido (Estilo Planilha) */}
                    <div className="glass p-4 rounded-2xl mb-6 shadow-xl border border-white/10">
                        <form onSubmit={addEntry} className="space-y-3">
                            <div className="flex bg-slate-900/50 rounded-lg p-1">
                                <button 
                                    type="button"
                                    onClick={() => setForm({...form, type: 'entrada'})}
                                    className={`flex-1 py-2 text-xs font-bold rounded-md transition-all ${form.type === 'entrada' ? 'bg-emerald-500 text-white shadow-lg' : 'text-slate-500'}`}
                                >GANHO</button>
                                <button 
                                    type="button"
                                    onClick={() => setForm({...form, type: 'saida'})}
                                    className={`flex-1 py-2 text-xs font-bold rounded-md transition-all ${form.type === 'saida' ? 'bg-red-500 text-white shadow-lg' : 'text-slate-500'}`}
                                >GASTO</button>
                            </div>
                            <input 
                                type="text" 
                                placeholder="O que foi?" 
                                className="w-full bg-slate-800/50 border border-slate-700/50 p-3 rounded-xl text-sm outline-none focus:border-sky-500 transition-all"
                                value={form.name}
                                onChange={(e) => setForm({...form, name: e.target.value})}
                            />
                            <div className="flex gap-2">
                                <input 
                                    type="number" 
                                    placeholder="Valor R$" 
                                    className="flex-1 bg-slate-800/50 border border-slate-700/50 p-3 rounded-xl text-sm outline-none focus:border-sky-500 transition-all"
                                    value={form.amount}
                                    onChange={(e) => setForm({...form, amount: e.target.value})}
                                />
                                <button className="bg-sky-500 hover:bg-sky-400 p-3 rounded-xl text-white shadow-lg shadow-sky-500/20 transition-all active:scale-95">
                                    <i data-lucide="plus" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                    {/* Lista Planilha Automática */}
                    <div className="flex-1">
                        <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 ml-1">Histórico de Hoje</h3>
                        <div className="space-y-2 overflow-y-auto max-h-[45vh] pr-1">
                            {transactions.length === 0 && (
                                <div className="text-center py-10 text-slate-600 text-xs italic">Aguardando lançamentos...</div>
                            )}
                            {transactions.map(t => (
                                <div key={t.id} className="flex justify-between items-center p-3 glass rounded-xl border-l-2 border-white/5">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-1 h-8 rounded-full ${t.type === 'entrada' ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                                        <div>
                                            <div className="text-sm font-semibold text-slate-200">{t.name}</div>
                                            <div className="text-[10px] text-slate-500">{t.time}</div>
                                        </div>
                                    </div>
                                    <div className={`text-sm font-bold ${t.type === 'entrada' ? 'text-emerald-400' : 'text-red-400'}`}>
                                        {t.type === 'entrada' ? '+' : '-'} {t.val.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Rodapé com Crédito */}
                    <footer className="mt-auto pt-6 text-center">
                        <p className="text-[9px] text-slate-600 font-medium tracking-[0.3em] uppercase">
                            Desenvolvido por <span className="text-slate-400">Gabriel Rodrigues</span>
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
