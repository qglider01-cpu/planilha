<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar PRO - Gestão em Grupo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --lunar-glow: #38bdf8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: white; 
            margin: 0;
            user-select: none;
            overflow-x: hidden;
        }

        /* Fundo Lunar Animado */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Bordas Animadas */
        .animated-border {
            position: relative;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 1.5rem;
            z-index: 1;
        }

        .animated-border::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, var(--lunar-glow), transparent, #818cf8, transparent);
            background-size: 400%;
            z-index: -1;
            border-radius: 1.6rem;
            animation: borderRotate 6s linear infinite;
            opacity: 0.8;
        }

        @keyframes borderRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.08);
        }

        input, select {
            -webkit-appearance: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CAT_ICONS = {
            'Salário': 'banknote',
            'Extra': 'plus-circle',
            'Vendas': 'shopping-cart',
            'Cartão': 'credit-card',
            'Lanches': 'utensils',
            'Pizza': 'pizza',
            'Mercado': 'shopping-bag',
            'Distrações': 'clapperboard',
            'Outros': 'help-circle'
        };

        const Stars = () => {
            useEffect(() => {
                const container = document.getElementById('stars');
                if (!container) return;
                container.innerHTML = '';
                for (let i = 0; i < 60; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 2 + 1 + 'px';
                    star.style.width = size;
                    star.style.height = size;
                    star.style.top = Math.random() * 100 + '%';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                    container.appendChild(star);
                }
            }, []);
            return null;
        };

        function App() {
            const [transactions, setTransactions] = useState(() => {
                try {
                    const saved = localStorage.getItem('lunar_data_v2');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    return [];
                }
            });
            
            const [form, setForm] = useState({ 
                user: '', 
                amount: '', 
                type: 'saida', 
                category: 'Cartão' 
            });

            const categories = useMemo(() => {
                return form.type === 'entrada' 
                    ? ['Salário', 'Extra', 'Vendas', 'Outros'] 
                    : ['Cartão', 'Lanches', 'Pizza', 'Mercado', 'Distrações', 'Outros'];
            }, [form.type]);

            useEffect(() => {
                localStorage.setItem('lunar_data_v2', JSON.stringify(transactions));
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            }, [transactions]);

            const addEntry = (e) => {
                e.preventDefault();
                const numAmount = parseFloat(form.amount);
                if(!form.user || isNaN(numAmount) || numAmount <= 0) return;
                
                const novo = {
                    id: Date.now(),
                    user: form.user,
                    val: numAmount,
                    type: form.type,
                    cat: form.category,
                    time: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
                    date: new Date().toLocaleDateString('pt-BR')
                };
                setTransactions([novo, ...transactions]);
                setForm({ ...form, amount: '' });
            };

            const deleteEntry = (id) => {
                // Modal de confirmação nativo para facilitar no mobile
                if(window.confirm("Apagar este registro permanentemente?")) {
                    setTransactions(prev => prev.filter(t => t.id !== id));
                }
            };

            const saldo = useMemo(() => {
                return transactions.reduce((acc, t) => t.type === 'entrada' ? acc + t.val : acc - t.val, 0);
            }, [transactions]);

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto px-5 py-8">
                    <Stars />
                    
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl font-black tracking-tighter text-white">LUNAR PRO</h1>
                        <div className="text-[10px] text-sky-400 font-bold tracking-[0.4em] uppercase mt-1">Gestão em Grupo</div>
                    </header>

                    <div className="mb-8">
                        <div className="animated-border p-6 shadow-2xl">
                            <div className="flex justify-between items-center text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">
                                Saldo Disponível
                                <i data-lucide="users" className="w-4 h-4 text-sky-400"></i>
                            </div>
                            <div className="text-3xl font-bold tracking-tight text-white break-all">
                                R$ {saldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                            </div>
                        </div>
                    </div>

                    {/* Formulário */}
                    <div className="glass p-5 rounded-[2rem] mb-6 shadow-2xl border border-white/10">
                        <form onSubmit={addEntry} className="space-y-4">
                            <div className="flex bg-slate-900/80 rounded-2xl p-1.5 border border-white/5">
                                <button 
                                    type="button"
                                    onClick={() => setForm({...form, type: 'entrada', category: 'Salário'})}
                                    className={`flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${form.type === 'entrada' ? 'bg-emerald-500 text-white shadow-lg' : 'text-slate-500'}`}
                                >ENTRADA</button>
                                <button 
                                    type="button"
                                    onClick={() => setForm({...form, type: 'saida', category: 'Cartão'})}
                                    className={`flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${form.type === 'saida' ? 'bg-red-500 text-white shadow-lg' : 'text-slate-500'}`}
                                >SAÍDA</button>
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-bold text-slate-500 uppercase ml-2 tracking-widest">Pessoa</label>
                                    <input 
                                        type="text" 
                                        placeholder="Nome" 
                                        className="w-full bg-slate-900/60 border border-white/5 p-3 rounded-xl text-sm outline-none focus:border-sky-500/50 text-white placeholder:text-slate-700"
                                        value={form.user}
                                        onChange={(e) => setForm({...form, user: e.target.value})}
                                    />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] font-bold text-slate-500 uppercase ml-2 tracking-widest">Tipo</label>
                                    <select 
                                        className="w-full bg-slate-900/60 border border-white/5 p-3 rounded-xl text-sm outline-none focus:border-sky-500/50 text-white"
                                        value={form.category}
                                        onChange={(e) => setForm({...form, category: e.target.value})}
                                    >
                                        {categories.map(c => <option key={c} value={c} className="bg-slate-950">{c}</option>)}
                                    </select>
                                </div>
                            </div>
                            
                            <div className="flex gap-3">
                                <div className="flex-1 space-y-1">
                                    <label className="text-[9px] font-bold text-slate-500 uppercase ml-2 tracking-widest">Quanto (R$)</label>
                                    <input 
                                        type="number" 
                                        step="any"
                                        placeholder="0,00" 
                                        className="w-full bg-slate-900/60 border border-white/5 p-3 rounded-xl text-sm outline-none focus:border-sky-500/50 text-white placeholder:text-slate-700"
                                        value={form.amount}
                                        onChange={(e) => setForm({...form, amount: e.target.value})}
                                    />
                                </div>
                                <button className="self-end bg-white text-black h-[46px] w-[46px] rounded-xl flex items-center justify-center shadow-xl active:scale-90 transition-all">
                                    <i data-lucide="plus" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                    {/* Histórico */}
                    <div className="flex-1 flex flex-col min-h-0">
                        <div className="flex justify-between items-center mb-4 px-2">
                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Fluxo de Caixa</h3>
                            <span className="text-[9px] text-slate-600 uppercase font-bold tracking-tighter">Dois cliques p/ apagar</span>
                        </div>
                        
                        <div className="space-y-2 overflow-y-auto flex-1 pb-10">
                            {transactions.length === 0 ? (
                                <div className="text-center py-10 text-slate-800 text-[10px] font-bold uppercase tracking-widest">Nenhum registro no momento</div>
                            ) : (
                                transactions.map(t => (
                                    <div 
                                        key={t.id} 
                                        onDoubleClick={() => deleteEntry(t.id)}
                                        className="flex justify-between items-center p-4 glass rounded-2xl border border-white/5 active:scale-[0.98] transition-transform"
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className={`p-2.5 rounded-xl ${t.type === 'entrada' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-400'}`}>
                                                <i data-lucide={CAT_ICONS[t.cat] || 'help-circle'} className="w-5 h-5"></i>
                                            </div>
                                            <div className="min-w-0">
                                                <div className="text-sm font-bold text-slate-200 truncate">{t.user}</div>
                                                <div className="text-[10px] text-slate-500 font-medium">{t.cat} • {t.time}</div>
                                            </div>
                                        </div>
                                        <div className={`text-sm font-black whitespace-nowrap ${t.type === 'entrada' ? 'text-emerald-400' : 'text-red-400'}`}>
                                            {t.type === 'entrada' ? '+' : '-'} {t.val.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    <footer className="py-6 text-center border-t border-white/5 bg-slate-950/50 -mx-5 px-5">
                        <p className="text-[9px] text-slate-600 font-bold tracking-[0.4em] uppercase">
                            Digital Wallet <span className="text-sky-500/50">By</span> <span className="text-slate-400 font-bold">Gabriel Rodrigues</span>
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
