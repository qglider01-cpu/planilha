<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Pro | Gestão de Risco & Alavancagem</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0f172a;
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.2s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            outline: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .stop-loss-glow {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs as Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, addDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-u9ii8P_ril727CzvAtIVFKU76TrcHzg",
            authDomain: "planilha-a251b.firebaseapp.com",
            projectId: "planilha-a251b",
            storageBucket: "planilha-a251b.firebasestorage.app",
            messagingSenderId: "1003937015443",
            appId: "1:1003937015443:web:2e151fa65c4c9091fa4f66",
            measurementId: "G-EJYQ0WSHM1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.FirebaseDB = { db, doc, onSnapshot, setDoc, updateDoc, collection, addDoc, deleteDoc, query, orderBy };
        window.FirebaseAuth = { auth, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { db, doc, onSnapshot, setDoc, updateDoc, collection, addDoc, deleteDoc, query, orderBy } = window.FirebaseDB || {};
        const { auth, signInAnonymously, onAuthStateChanged } = window.FirebaseAuth || {};

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authError, setAuthError] = useState(null);
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [inputValue, setInputValue] = useState('');
            const [transactions, setTransactions] = useState([]);
            const [profile, setProfile] = useState({ 
                name: 'Trader Pro', 
                target: 1000, 
                initialBalance: 100,
                riskPercent: 5,
                stopLoss: 50 // Novo campo: Stop Loss Diário
            });

            // Auth Effect
            useEffect(() => {
                if (!auth) return;
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                    else signInAnonymously(auth).catch(err => {
                        setAuthError("Erro de Autenticação. Verifique o Firebase.");
                        setLoading(false);
                    });
                });
                return () => unsubscribe();
            }, []);

            // Data Sync Effect
            useEffect(() => {
                if (!user || !db) return;
                const pRef = doc(db, 'users_data', user.uid, 'settings', 'profile');
                const tRef = collection(db, 'users_data', user.uid, 'transactions');
                const q = query(tRef, orderBy('timestamp', 'desc'));

                const unsubP = onSnapshot(pRef, (s) => {
                    if (s.exists()) setProfile(s.data());
                    else setDoc(pRef, profile);
                });

                const unsubT = onSnapshot(q, (s) => {
                    const data = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setTransactions(data);
                    setLoading(false);
                });

                return () => { unsubP(); unsubT(); };
            }, [user]);

            // Calculations
            const stats = useMemo(() => {
                // Filtrar transações de hoje para o Stop Loss
                const today = new Date().setHours(0,0,0,0);
                const todayTrans = transactions.filter(t => t.timestamp >= today);
                
                const totalProfit = transactions.filter(t => t.type === 'profit').reduce((a, b) => a + b.amount, 0);
                const totalLoss = transactions.filter(t => t.type === 'loss').reduce((a, b) => a + b.amount, 0);
                
                const todayProfit = todayTrans.filter(t => t.type === 'profit').reduce((a, b) => a + b.amount, 0);
                const todayLoss = todayTrans.filter(t => t.type === 'loss').reduce((a, b) => a + b.amount, 0);
                const dailyResult = todayProfit - todayLoss;
                
                const currentBalance = profile.initialBalance + totalProfit - totalLoss;
                const suggestedEntry = (currentBalance * (profile.riskPercent / 100));
                const progress = Math.min(((currentBalance - profile.initialBalance) / (profile.target - profile.initialBalance)) * 100, 100);
                
                const isStopGain = currentBalance >= profile.target;
                const isStopLoss = dailyResult <= -(profile.stopLoss);
                
                const redCount = todayTrans.filter(t => t.type === 'loss').length;
                const winCount = todayTrans.filter(t => t.type === 'profit').length;

                return { 
                    currentBalance, suggestedEntry, progress, isStopGain, isStopLoss, 
                    totalProfit, totalLoss, dailyResult, redCount, winCount 
                };
            }, [transactions, profile]);

            const handleTrans = async (type, manualAmount = null) => {
                if (stats.isStopLoss && type === 'loss') {
                    alert("Você já atingiu o Stop Loss hoje! Proteja seu capital.");
                }
                
                const amount = manualAmount !== null ? parseFloat(manualAmount) : stats.suggestedEntry;
                if (isNaN(amount) || amount <= 0 || !user) return;

                try {
                    await addDoc(collection(db, 'users_data', user.uid, 'transactions'), {
                        amount, type, timestamp: Date.now()
                    });
                    setInputValue('');
                } catch (err) {
                    alert("Erro ao salvar: " + err.message);
                }
            };

            const saveProfile = async () => {
                if (!user) return;
                try {
                    await updateDoc(doc(db, 'users_data', user.uid, 'settings', 'profile'), profile);
                    setIsEditingProfile(false);
                } catch (err) {
                    alert("Erro ao salvar perfil: " + err.message);
                }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center space-y-4">
                    <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-slate-400 font-medium animate-pulse">Sincronizando Gestão...</p>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto space-y-6 animate-fade-in">
                    {/* Header Section */}
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-2">
                        <div>
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-blue-500/20 rounded-lg">
                                    <div className={`w-3 h-3 rounded-full animate-pulse ${stats.isStopLoss ? 'bg-rose-500' : 'bg-blue-500'}`}></div>
                                </div>
                                <h1 className="text-2xl font-extrabold tracking-tight text-white uppercase">
                                    {profile.name}
                                </h1>
                            </div>
                            <p className="text-xs text-slate-500 font-semibold tracking-widest mt-1 uppercase">Controle de Risco Ativo</p>
                        </div>
                        <button 
                            onClick={() => setIsEditingProfile(!isEditingProfile)}
                            className="flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-all text-xs font-bold"
                        >
                            {isEditingProfile ? "CANCELAR" : "AJUSTES"}
                        </button>
                    </header>

                    {/* Alerts Section */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {stats.isStopLoss && (
                            <div className="bg-rose-500/10 border border-rose-500/50 p-4 rounded-2xl flex items-center gap-4 text-rose-400 stop-loss-glow animate-bounce">
                                <div className="text-2xl">🚫</div>
                                <div>
                                    <p className="font-black text-xs uppercase tracking-widest">STOP LOSS ATINGIDO!</p>
                                    <p className="text-[10px] font-bold opacity-70 text-rose-300">Limite de R$ {profile.stopLoss} excedido. Pare agora!</p>
                                </div>
                            </div>
                        )}
                        {stats.isStopGain && (
                            <div className="bg-emerald-500/10 border border-emerald-500/50 p-4 rounded-2xl flex items-center gap-4 text-emerald-400 animate-pulse">
                                <div className="text-2xl">🏆</div>
                                <div>
                                    <p className="font-black text-xs uppercase tracking-widest">META ATINGIDA!</p>
                                    <p className="text-[10px] font-bold opacity-70 text-emerald-300">Meta de R$ {profile.target} batida. Proteja o lucro!</p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Main Stats Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Balance Card */}
                        <div className="lg:col-span-2 glass-card rounded-[2rem] p-8 relative overflow-hidden">
                            <div className="relative z-10">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-sm font-medium text-slate-400 mb-1">Saldo Atual</p>
                                        <h2 className={`text-5xl font-black mono ${stats.currentBalance >= profile.initialBalance ? 'text-emerald-400' : 'text-rose-400'}`}>
                                            R$ {stats.currentBalance.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                        </h2>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Resultado Diário</p>
                                        <p className={`text-xl font-black mono ${stats.dailyResult >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                            {stats.dailyResult >= 0 ? '+' : ''}R$ {stats.dailyResult.toFixed(2)}
                                        </p>
                                    </div>
                                </div>
                                
                                <div className="mt-8 grid grid-cols-2 md:grid-cols-4 gap-6">
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Meta</p>
                                        <p className="text-lg font-bold text-blue-400 mono">R$ {profile.target.toFixed(2)}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Stop Loss</p>
                                        <p className="text-lg font-bold text-rose-500 mono">R$ {profile.stopLoss.toFixed(2)}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Wins Hoje</p>
                                        <p className="text-lg font-bold text-emerald-500 mono">{stats.winCount}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">Reds Hoje</p>
                                        <p className="text-lg font-bold text-rose-500 mono">{stats.redCount}</p>
                                    </div>
                                </div>

                                {/* Progress Bar */}
                                <div className="mt-8">
                                    <div className="flex justify-between text-[10px] font-bold uppercase mb-2">
                                        <span className="text-slate-500">Progresso da Meta</span>
                                        <span className="text-blue-400">{stats.progress.toFixed(1)}%</span>
                                    </div>
                                    <div className="h-2 bg-slate-800 rounded-full overflow-hidden">
                                        <div 
                                            className="h-full bg-gradient-to-r from-blue-600 to-indigo-400 transition-all duration-1000 ease-out"
                                            style={{ width: `${stats.progress}%` }}
                                        ></div>
                                    </div>
                                </div>
                            </div>
                            <div className={`absolute -right-10 -top-10 w-40 h-40 blur-[80px] rounded-full ${stats.isStopLoss ? 'bg-rose-500/20' : 'bg-blue-500/10'}`}></div>
                        </div>

                        {/* Suggested Entry Card */}
                        <div className={`glass-card rounded-[2rem] p-8 flex flex-col justify-between ${stats.isStopLoss ? 'border-rose-500/30' : 'border-blue-500/20'}`}>
                            <div>
                                <div className="flex items-center gap-2 mb-4">
                                    <div className={`p-2 rounded-lg ${stats.isStopLoss ? 'bg-rose-500/20 text-rose-400' : 'bg-indigo-500/20 text-indigo-400'}`}>
                                        <i data-lucide="target" size="20"></i>
                                    </div>
                                    <span className="text-sm font-bold uppercase tracking-wider">Entrada Sugerida</span>
                                </div>
                                <p className={`text-4xl font-black mono ${stats.isStopLoss ? 'text-slate-500 line-through' : 'text-white'}`}>
                                    R$ {stats.suggestedEntry.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </p>
                                <p className="text-xs text-slate-500 mt-2 font-medium">
                                    {stats.isStopLoss ? "Operações bloqueadas por Stop Loss." : `Risco de ${profile.riskPercent}% da banca.`}
                                </p>
                            </div>
                            <button 
                                onClick={() => handleTrans('profit')}
                                disabled={stats.isStopLoss}
                                className={`mt-6 w-full py-4 rounded-2xl font-black text-sm tracking-widest shadow-lg transition-all ${stats.isStopLoss ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'btn-primary text-white'}`}
                            >
                                {stats.isStopLoss ? "STOP LOSS ATINGIDO" : "LANÇAR WIN SUGERIDO"}
                            </button>
                        </div>
                    </div>

                    {/* Controls & History */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Manual Entry Form */}
                        <div className="lg:col-span-1 space-y-6">
                            {isEditingProfile ? (
                                <div className="glass-card rounded-[2rem] p-6 space-y-4 animate-fade-in">
                                    <h3 className="text-sm font-bold uppercase tracking-widest text-blue-400 mb-2">Ajustes de Gestão</h3>
                                    <div className="space-y-3">
                                        <label className="block">
                                            <span className="text-[10px] text-slate-500 font-bold uppercase ml-1">Nome do Trader</span>
                                            <input className="w-full input-field p-3 rounded-xl text-sm font-bold" value={profile.name} onChange={e => setProfile({...profile, name: e.target.value})} />
                                        </label>
                                        <div className="grid grid-cols-2 gap-3">
                                            <label className="block">
                                                <span className="text-[10px] text-slate-500 font-bold uppercase ml-1">Banca (R$)</span>
                                                <input type="number" className="w-full input-field p-3 rounded-xl text-sm font-bold mono" value={profile.initialBalance} onChange={e => setProfile({...profile, initialBalance: parseFloat(e.target.value) || 0})} />
                                            </label>
                                            <label className="block">
                                                <span className="text-[10px] text-slate-500 font-bold uppercase ml-1">Risco (%)</span>
                                                <input type="number" className="w-full input-field p-3 rounded-xl text-sm font-bold mono" value={profile.riskPercent} onChange={e => setProfile({...profile, riskPercent: parseFloat(e.target.value) || 0})} />
                                            </label>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <label className="block">
                                                <span className="text-[10px] text-emerald-500 font-bold uppercase ml-1">Meta (R$)</span>
                                                <input type="number" className="w-full input-field p-3 rounded-xl text-sm font-bold mono border-emerald-500/20" value={profile.target} onChange={e => setProfile({...profile, target: parseFloat(e.target.value) || 0})} />
                                            </label>
                                            <label className="block">
                                                <span className="text-[10px] text-rose-500 font-bold uppercase ml-1">Stop Loss (R$)</span>
                                                <input type="number" className="w-full input-field p-3 rounded-xl text-sm font-bold mono border-rose-500/20" value={profile.stopLoss} onChange={e => setProfile({...profile, stopLoss: parseFloat(e.target.value) || 0})} />
                                            </label>
                                        </div>
                                    </div>
                                    <button onClick={saveProfile} className="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-xs transition-colors mt-2">
                                        SALVAR CONFIGURAÇÕES
                                    </button>
                                </div>
                            ) : (
                                <div className="glass-card rounded-[2rem] p-6">
                                    <h3 className="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4">Lançamento Manual</h3>
                                    <div className="space-y-4">
                                        <input 
                                            type="number" 
                                            className="w-full input-field p-4 rounded-2xl text-lg font-bold mono text-center" 
                                            placeholder="0,00" 
                                            value={inputValue} 
                                            onChange={e => setInputValue(e.target.value)} 
                                            disabled={stats.isStopLoss}
                                        />
                                        <div className="grid grid-cols-2 gap-3">
                                            <button 
                                                onClick={() => handleTrans('profit', inputValue)}
                                                disabled={stats.isStopLoss}
                                                className={`py-4 rounded-2xl font-black text-xs transition-all ${stats.isStopLoss ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-emerald-600/20 hover:bg-emerald-600 border border-emerald-500/30 text-emerald-400 hover:text-white'}`}
                                            >
                                                WIN
                                            </button>
                                            <button 
                                                onClick={() => handleTrans('loss', inputValue)}
                                                disabled={stats.isStopLoss}
                                                className={`py-4 rounded-2xl font-black text-xs transition-all ${stats.isStopLoss ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-rose-600/20 hover:bg-rose-600 border border-rose-500/30 text-rose-400 hover:text-white'}`}
                                            >
                                                LOSS (RED)
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* History Table */}
                        <div className="lg:col-span-2 glass-card rounded-[2rem] overflow-hidden flex flex-col">
                            <div className="p-6 border-b border-slate-800 flex justify-between items-center">
                                <h3 className="text-sm font-bold uppercase tracking-widest text-slate-400">Histórico de Hoje</h3>
                                <div className="flex gap-2">
                                    <span className="text-[10px] bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded font-bold">{stats.winCount} WINS</span>
                                    <span className="text-[10px] bg-rose-500/10 text-rose-500 px-2 py-1 rounded font-bold">{stats.redCount} REDS</span>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto max-h-[400px]">
                                {transactions.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-20 text-slate-600">
                                        <p className="text-xs font-bold uppercase tracking-widest">Aguardando operações...</p>
                                    </div>
                                ) : (
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="text-[10px] text-slate-500 uppercase font-black border-b border-slate-800/50">
                                                <th className="px-6 py-4">Horário</th>
                                                <th className="px-6 py-4">Tipo</th>
                                                <th className="px-6 py-4 text-right">Valor</th>
                                                <th className="px-6 py-4 text-center">Ação</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/30">
                                            {transactions.map(t => (
                                                <tr key={t.id} className="hover:bg-white/5 transition-colors group">
                                                    <td className="px-6 py-4 text-xs text-slate-400 mono">
                                                        {new Date(t.timestamp).toLocaleTimeString('pt-BR')}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <span className={`text-[10px] font-black px-2 py-1 rounded ${t.type === 'profit' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}`}>
                                                            {t.type === 'profit' ? 'WIN' : 'RED'}
                                                        </span>
                                                    </td>
                                                    <td className={`px-6 py-4 text-sm font-bold text-right mono ${t.type === 'profit' ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                        R$ {t.amount.toFixed(2)}
                                                    </td>
                                                    <td className="px-6 py-4 text-center">
                                                        <button 
                                                            onClick={() => deleteDoc(doc(db, 'users_data', user.uid, 'transactions', t.id))} 
                                                            className="p-2 text-slate-700 hover:text-rose-500 transition-colors opacity-0 group-hover:opacity-100"
                                                        >
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    <footer className="text-center py-8">
                        <p className="text-[10px] text-slate-600 font-bold tracking-[0.2em] uppercase">
                            Trader Pro Gabriel rodrigues ; 2026 • Cloud Sync Active
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // Initialize Lucide icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
