<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Trader Pro | Gestão de Elite</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain; /* Evita pull-to-refresh no mobile */
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Glassmorphism Pro */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }

        /* Botões Mobile First */
        .btn-action {
            @apply active:scale-95 transition-all duration-150 select-none touch-manipulation;
            height: 64px; /* Altura ideal para o polegar */
        }

        .btn-win {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-loss {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-suggested {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        /* Input Estilizado */
        .input-pro {
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.05);
            @apply focus:border-blue-500 focus:ring-0 outline-none transition-all text-center font-bold;
        }

        /* Animações */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Scrollbar Invisível mas funcional */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Estilo para o Alerta de Stop Loss */
        .stop-loss-active {
            border: 2px solid #ef4444 !important;
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="no-scrollbar">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, addDoc, deleteDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-u9ii8P_ril727CzvAtIVFKU76TrcHzg",
            authDomain: "planilha-a251b.firebaseapp.com",
            projectId: "planilha-a251b",
            storageBucket: "planilha-a251b.firebasestorage.app",
            messagingSenderId: "1003937015443",
            appId: "1:1003937015443:web:2e151fa65c4c9091fa4f66",
            measurementId: "G-EJYQ0WSHM1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.FirebaseDB = { db, doc, onSnapshot, setDoc, updateDoc, collection, addDoc, deleteDoc, query, orderBy, limit };
        window.FirebaseAuth = { auth, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const { db, doc, onSnapshot, setDoc, updateDoc, collection, addDoc, deleteDoc, query, orderBy, limit } = window.FirebaseDB || {};
        const { auth, signInAnonymously, onAuthStateChanged } = window.FirebaseAuth || {};

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isEditing, setIsEditing] = useState(false);
            const [inputValue, setInputValue] = useState('');
            const [transactions, setTransactions] = useState([]);
            const [profile, setProfile] = useState({ 
                name: 'Trader Pro', 
                target: 1000, 
                initialBalance: 100,
                riskPercent: 5,
                stopLoss: 50
            });

            // Persistência de Dados (Auth)
            useEffect(() => {
                if (!auth) return;
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                    else signInAnonymously(auth).catch(console.error);
                });
                return () => unsubscribe();
            }, []);

            // Sincronização em Tempo Real
            useEffect(() => {
                if (!user || !db) return;
                
                const pRef = doc(db, 'users_data', user.uid, 'settings', 'profile');
                const tRef = collection(db, 'users_data', user.uid, 'transactions');
                const q = query(tRef, orderBy('timestamp', 'desc'), limit(50));

                const unsubP = onSnapshot(pRef, (s) => {
                    if (s.exists()) setProfile(s.data());
                    else setDoc(pRef, profile);
                });

                const unsubT = onSnapshot(q, (s) => {
                    setTransactions(s.docs.map(d => ({id: d.id, ...d.data()})));
                    setLoading(false);
                });

                return () => { unsubP(); unsubT(); };
            }, [user]);

            // Cálculos de Gestão
            const stats = useMemo(() => {
                const today = new Date().setHours(0,0,0,0);
                const todayTrans = transactions.filter(t => t.timestamp >= today);
                
                const totalProfit = transactions.filter(t => t.type === 'profit').reduce((a, b) => a + b.amount, 0);
                const totalLoss = transactions.filter(t => t.type === 'loss').reduce((a, b) => a + b.amount, 0);
                
                const todayProfit = todayTrans.filter(t => t.type === 'profit').reduce((a, b) => a + b.amount, 0);
                const todayLoss = todayTrans.filter(t => t.type === 'loss').reduce((a, b) => a + b.amount, 0);
                const dailyResult = todayProfit - todayLoss;
                
                const currentBalance = profile.initialBalance + totalProfit - totalLoss;
                const suggestedEntry = (currentBalance * (profile.riskPercent / 100));
                const progress = Math.min(((currentBalance - profile.initialBalance) / (profile.target - profile.initialBalance)) * 100, 100);
                
                const isStopGain = currentBalance >= profile.target;
                const isStopLoss = dailyResult <= -(profile.stopLoss);
                
                return { 
                    currentBalance, suggestedEntry, progress, isStopGain, isStopLoss, 
                    dailyResult, redCount: todayTrans.filter(t => t.type === 'loss').length,
                    winCount: todayTrans.filter(t => t.type === 'profit').length
                };
            }, [transactions, profile]);

            const handleAction = useCallback(async (type, amountOverride = null) => {
                const amount = amountOverride !== null ? parseFloat(amountOverride) : stats.suggestedEntry;
                if (isNaN(amount) || amount <= 0 || !user) return;

                try {
                    await addDoc(collection(db, 'users_data', user.uid, 'transactions'), {
                        amount, type, timestamp: Date.now()
                    });
                    setInputValue('');
                    // Feedback tátil (se disponível)
                    if (window.navigator.vibrate) window.navigator.vibrate(50);
                } catch (err) {
                    alert("Erro ao salvar dados. Verifique sua conexão.");
                }
            }, [user, stats.suggestedEntry]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#0f172a]">
                    <div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-blue-400 font-bold tracking-widest animate-pulse">CARREGANDO GESTÃO...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto bg-[#0f172a] pb-10">
                    {/* Header Mobile */}
                    <header className="p-6 pt-10 flex justify-between items-center sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md">
                        <div>
                            <h1 className="text-xl font-black text-white tracking-tighter uppercase flex items-center gap-2">
                                <span className={`w-2 h-2 rounded-full ${stats.isStopLoss ? 'bg-red-500' : 'bg-emerald-500'} animate-pulse`}></span>
                                {profile.name}
                            </h1>
                            <p className="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Cloud Sync Ativo</p>
                        </div>
                        <button onClick={() => setIsEditing(!isEditing)} className="p-3 bg-slate-800 rounded-2xl text-slate-400 active:bg-slate-700 transition-colors">
                            <i data-lucide={isEditing ? "x" : "settings"} size="20"></i>
                        </button>
                    </header>

                    <main className="flex-1 px-6 space-y-6 animate-slide-up">
                        {/* Card de Saldo Principal */}
                        <div className={`glass-card rounded-[2.5rem] p-8 relative overflow-hidden ${stats.isStopLoss ? 'stop-loss-active' : ''}`}>
                            <div className="relative z-10">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Saldo Total</span>
                                    <span className={`text-[10px] font-black px-2 py-1 rounded-full ${stats.dailyResult >= 0 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}`}>
                                        HOJE: {stats.dailyResult >= 0 ? '+' : ''}R$ {stats.dailyResult.toFixed(2)}
                                    </span>
                                </div>
                                <h2 className={`text-4xl font-black mono mb-6 ${stats.currentBalance >= profile.initialBalance ? 'text-emerald-400' : 'text-red-400'}`}>
                                    R$ {stats.currentBalance.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </h2>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-slate-900/50 p-3 rounded-2xl border border-white/5">
                                        <p className="text-[9px] text-slate-500 font-bold uppercase mb-1">Meta</p>
                                        <p className="text-sm font-bold text-blue-400 mono">R$ {profile.target.toFixed(2)}</p>
                                    </div>
                                    <div className="bg-slate-900/50 p-3 rounded-2xl border border-white/5">
                                        <p className="text-[9px] text-slate-500 font-bold uppercase mb-1">Stop Loss</p>
                                        <p className="text-sm font-bold text-red-500 mono">R$ {profile.stopLoss.toFixed(2)}</p>
                                    </div>
                                </div>

                                {/* Barra de Progresso */}
                                <div className="mt-6">
                                    <div className="flex justify-between text-[9px] font-black uppercase mb-2">
                                        <span className="text-slate-500">Progresso</span>
                                        <span className="text-blue-400">{stats.progress.toFixed(1)}%</span>
                                    </div>
                                    <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                        <div className="h-full bg-blue-500 transition-all duration-1000" style={{ width: `${stats.progress}%` }}></div>
                                    </div>
                                </div>
                            </div>
                            <div className="absolute -right-10 -top-10 w-32 h-32 bg-blue-500/10 blur-[60px] rounded-full"></div>
                        </div>

                        {/* Área de Operação */}
                        {isEditing ? (
                            <div className="glass-card rounded-[2.5rem] p-6 space-y-4 animate-slide-up">
                                <h3 className="text-xs font-black uppercase tracking-widest text-blue-400 text-center">Configurações de Gestão</h3>
                                <div className="space-y-3">
                                    <input className="w-full input-pro p-4 rounded-2xl text-sm" placeholder="Nome do Trader" value={profile.name} onChange={e => setProfile({...profile, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="number" className="w-full input-pro p-4 rounded-2xl text-sm" placeholder="Banca" value={profile.initialBalance} onChange={e => setProfile({...profile, initialBalance: parseFloat(e.target.value) || 0})} />
                                        <input type="number" className="w-full input-pro p-4 rounded-2xl text-sm" placeholder="Risco %" value={profile.riskPercent} onChange={e => setProfile({...profile, riskPercent: parseFloat(e.target.value) || 0})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="number" className="w-full input-pro p-4 rounded-2xl text-sm border-emerald-500/20" placeholder="Meta" value={profile.target} onChange={e => setProfile({...profile, target: parseFloat(e.target.value) || 0})} />
                                        <input type="number" className="w-full input-pro p-4 rounded-2xl text-sm border-red-500/20" placeholder="Stop Loss" value={profile.stopLoss} onChange={e => setProfile({...profile, stopLoss: parseFloat(e.target.value) || 0})} />
                                    </div>
                                </div>
                                <button onClick={() => { updateDoc(doc(db, 'users_data', user.uid, 'settings', 'profile'), profile); setIsEditing(false); }} className="w-full py-4 bg-blue-600 rounded-2xl font-black text-xs tracking-widest active:bg-blue-500 transition-colors">
                                    SALVAR ALTERAÇÕES
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {/* Entrada Sugerida */}
                                <div className="flex flex-col items-center justify-center py-4">
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-2">Entrada Sugerida</span>
                                    <div className="text-3xl font-black mono text-white">R$ {stats.suggestedEntry.toFixed(2)}</div>
                                </div>

                                {/* Botões de Ação Grandes */}
                                <div className="grid grid-cols-1 gap-3">
                                    <button 
                                        onClick={() => handleAction('profit')}
                                        disabled={stats.isStopLoss}
                                        className={`btn-action btn-suggested rounded-2xl font-black text-sm tracking-widest flex items-center justify-center gap-3 ${stats.isStopLoss ? 'opacity-20 grayscale cursor-not-allowed' : ''}`}
                                    >
                                        <i data-lucide="trending-up" size="20"></i> LANÇAR WIN SUGERIDO
                                    </button>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <button 
                                            onClick={() => handleAction('profit', inputValue)}
                                            disabled={stats.isStopLoss}
                                            className={`btn-action btn-win rounded-2xl font-black text-sm tracking-widest flex items-center justify-center gap-2 ${stats.isStopLoss ? 'opacity-20 grayscale cursor-not-allowed' : ''}`}
                                        >
                                            WIN
                                        </button>
                                        <button 
                                            onClick={() => handleAction('loss', inputValue)}
                                            disabled={stats.isStopLoss}
                                            className={`btn-action btn-loss rounded-2xl font-black text-sm tracking-widest flex items-center justify-center gap-2 ${stats.isStopLoss ? 'opacity-20 grayscale cursor-not-allowed' : ''}`}
                                        >
                                            RED
                                        </button>
                                    </div>
                                </div>

                                {/* Input Manual */}
                                <input 
                                    type="number" 
                                    className="w-full input-pro p-5 rounded-2xl text-xl mb-4" 
                                    placeholder="VALOR MANUAL" 
                                    value={inputValue} 
                                    onChange={e => setInputValue(e.target.value)}
                                    disabled={stats.isStopLoss}
                                />
                            </div>
                        )}

                        {/* Histórico Simplificado Mobile */}
                        <div className="glass-card rounded-[2.5rem] overflow-hidden">
                            <div className="p-5 border-b border-white/5 flex justify-between items-center">
                                <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Histórico Recente</h3>
                                <div className="flex gap-2">
                                    <span className="text-[9px] font-bold text-emerald-400">{stats.winCount}W</span>
                                    <span className="text-[9px] font-bold text-red-400">{stats.redCount}R</span>
                                </div>
                            </div>
                            <div className="max-h-60 overflow-y-auto no-scrollbar">
                                {transactions.length === 0 ? (
                                    <div className="p-10 text-center text-[10px] font-bold text-slate-600 uppercase tracking-widest">Sem operações</div>
                                ) : (
                                    <div className="divide-y divide-white/5">
                                        {transactions.map(t => (
                                            <div key={t.id} className="p-4 flex justify-between items-center active:bg-white/5 transition-colors">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-1.5 h-1.5 rounded-full ${t.type === 'profit' ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                                                    <span className="text-[10px] text-slate-500 mono">{new Date(t.timestamp).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</span>
                                                </div>
                                                <span className={`text-sm font-bold mono ${t.type === 'profit' ? 'text-emerald-400' : 'text-red-400'}`}>
                                                    {t.type === 'profit' ? '+' : '-'} R$ {t.amount.toFixed(2)}
                                                </span>
                                                <button onClick={() => deleteDoc(doc(db, 'users_data', user.uid, 'transactions', t.id))} className="p-2 text-slate-700">
                                                    <i data-lucide="trash-2" size="14"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    <footer className="p-8 text-center">
                        <p className="text-[9px] text-slate-600 font-bold tracking-[0.3em] uppercase">Trader Pro Elite &copy; 2024</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // Initialize Lucide icons
        const initIcons = () => { if(window.lucide) lucide.createIcons(); else setTimeout(initIcons, 100); };
        initIcons();
    </script>
</body>
</html>
